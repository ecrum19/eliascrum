name: Deploy To GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install Dependencies
        run: npm install

      - name: Regenerate Talks Data (if slide sources exist)
        run: |
          if [ -f .talk-assets/slides.tar.gz ] || [ -d slides ]; then
            npm run build:slides
          else
            echo "Skipping build:slides because no slide source was found (expected .talk-assets/slides.tar.gz or ./slides)."
          fi

      - name: Compute Vite base path
        id: base
        run: |
          repo="${GITHUB_REPOSITORY#*/}"
          if [[ "$repo" == *.github.io ]]; then
            echo "base=/" >> "$GITHUB_OUTPUT"
          else
            echo "base=/$repo/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: npm run build -- --base "${{ steps.base.outputs.base }}"

      - name: Add SPA fallback and nojekyll marker
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
