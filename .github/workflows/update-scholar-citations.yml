name: Update Scholar Citations

on:
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-scholar-citations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update citation counts from Google Scholar
        run: npm run update:scholar

      - name: Commit and push changes
        run: |
          if git diff --quiet -- src/data/scholarCitations.ts; then
            echo "No citation changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/scholarCitations.ts
          git commit -m "chore: update Google Scholar citation counts"
          git push
