name: Build On Push

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm install

      - name: Install Ghostscript
        run: sudo apt-get update && sudo apt-get install -y ghostscript

      - name: Regenerate Talks Data (if slide sources exist)
        run: |
          if [ -f .talk-assets/slides.tar.gz ] || [ -d slides ]; then
            npm run build:slides
          else
            echo "Skipping build:slides because no slide source was found (expected .talk-assets/slides.tar.gz or ./slides)."
          fi

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
